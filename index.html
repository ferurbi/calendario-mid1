<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Calendario de Turnos MID1</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { margin: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f1117; color: #e2e8f0; padding: 16px; }
.container { max-width: 780px; margin: 0 auto; }

.header { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; flex-wrap: wrap; }
.header h1 { font-size: 9px; }
.badge { background: #1e3a5f; color: #60a5fa; font-size: 13px; font-weight: 600; padding: 2px 8px; border-radius: 20px; }

.team { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 12px; }
.team-card { background: #1a1d27; border-radius: 10px; padding: 16px; display: flex; align-items: center; gap: 14px; border: 1px solid #2a2e3a; }
.team-card img { width: 64px; height: 64px; border-radius: 50%; flex-shrink: 0; object-fit: cover; }
.team-card .info { flex: 1; }
.team-card .name { font-size: 15px; font-weight: 600; }
.team-card .alias { font-size: 13px; color: #64748b; }
.team-card .days { font-size: 12px; color: #64748b; margin-top: 2px; }
.shift-tag { font-size: 12px; font-weight: 700; padding: 2px 8px; border-radius: 12px; }

.controls { display: flex; align-items: center; gap: 10px; margin-bottom: 5px; flex-wrap: wrap; }
.legend { display: flex; gap: 10px; flex-wrap: wrap; }
.legend span { font-size: 13px; display: flex; align-items: center; gap: 8px; }
.legend .dot { width: 10px; height: 10px; border-radius: 3px; }
.nav { margin-left: auto; display: flex; align-items: center; gap: 6px; }
.nav .month-title { font-size: 11px; font-weight: 600; min-width: 150px; text-align: center; }
.btn { padding: 10px 24px; border-radius: 6px; border: 1px solid #dfe1e6; background: #1a1d27; font-size: 9px; cursor: pointer; transition: all 0.15s; }
.btn:hover { background: #1e3a5f; border-color: #3B82F6; color: #60a5fa; }
.btn-icon { width: 30px; height: 30px; border-radius: 50%; padding: 0; display: flex; align-items: center; justify-content: center; }
.btn-primary { background: #2563EB; color: #fff; border-color: #2563EB; }
.btn-primary:hover { background: #003d99; }

.cal { background: #1a1d27; border-radius: 10px; border: 1px solid #2a2e3a; overflow: hidden; }
.cal-header { display: grid; grid-template-columns: repeat(7, 1fr); background: #0f1117; }
.cal-header div { padding: 8px; text-align: center; font-size: 13px; font-weight: 600; color: #64748b; text-transform: uppercase; }
.cal-grid { display: flex; flex-direction: column; }
.cal-cell { min-height: 88px; border-right: 1px solid #252830; border-bottom: 1px solid #252830; padding: 6px; position: relative; }
.cal-cell:nth-child(7n) { border-right: none; }
.cal-cell.other { opacity: 0.3; background: #12141a; }
.cal-cell.today { background: #1e3a5f; outline: 2px solid #3B82F6; outline-offset: -2px; }
.cal-cell.transition { background: #2a2210; border-left: 3px solid #F59E0B; }
.cal-cell .day-num { font-size: 13px; font-weight: 600; color: #94a3b8; margin-bottom: 3px; }
.cal-cell.today .day-num { color: #0052CC; }
.change-badge { font-size: 9px; background: #FF991F; color: #fff; padding: 1px 3px; border-radius: 3px; font-weight: 700; vertical-align: middle; margin-left: 2px; }
.trans-badge { font-size: 9px; background: #6554C0; color: #fff; padding: 1px 3px; border-radius: 3px; font-weight: 700; vertical-align: middle; margin-left: 2px; }
.cal-cell .shifts { display: flex; flex-direction: column; gap: 3px; overflow: visible; position: relative; z-index: 2; }
.s-item { font-size: 13px; padding: 10px 12px; border-radius: 0; display: flex; align-items: center; gap: 8px; margin: 0 -6px; min-height: 22px; overflow: hidden; white-space: nowrap; position: relative; z-index: 2; }
.s-item.span-start { border-radius: 5px 0 0 5px; margin-left: 0; margin-right: -6px; padding-left: 6px; padding-right: 6px; }
.s-item.span-mid { border-radius: 0; margin-left: -6px; margin-right: -6px; padding-left: 6px; padding-right: 6px; }
.s-item.span-end { border-radius: 0 5px 5px 0; margin-left: -6px; margin-right: 0; padding-left: 6px; padding-right: 6px; }
.s-item.span-single { border-radius: 5px; margin: 0; padding: 10px 16px; }
.s-item img { width: 16px; height: 16px; border-radius: 50%; }
.s-item b { min-width: 18px; }
.s-fd { background: rgba(45, 134, 89, 0.55); color: #6EE7A0; font-weight: 600; padding: 7px 8px; font-size: 13px; border: 1px solid rgba(45, 134, 89, 0.4); }
.s-bd { background: rgba(192, 101, 48, 0.55); color: #FDBA74; font-weight: 600; padding: 7px 8px; font-size: 13px; border: 1px solid rgba(192, 101, 48, 0.4); }
.s-fn { background: rgba(109, 75, 160, 0.55); color: #C4B5FD; font-weight: 600; padding: 7px 8px; font-size: 13px; border: 1px solid rgba(109, 75, 160, 0.4); }
.s-bn { background: rgba(42, 122, 140, 0.55); color: #67E8F9; font-weight: 600; padding: 7px 8px; font-size: 13px; border: 1px solid rgba(42, 122, 140, 0.4); }


.week-row { display: grid; grid-template-columns: repeat(7, 1fr); position: relative; min-height: 88px; }
.week-row .cal-cell { position: relative; }
.week-row .cal-cell .shifts { display: none; }
.shift-overlay { position: absolute; display: flex; align-items: center; gap: 5px; padding: 0 6px; font-size: 12px; font-weight: 600; overflow: hidden; white-space: nowrap; z-index: 5; pointer-events: none; }
.shift-overlay img { width: 18px; height: 18px; border-radius: 50%; }
.shift-overlay b { min-width: 16px; }
.shift-overlay.so-fd { background: rgba(45, 134, 89, 0.55); color: #6EE7A0; border: 1px solid rgba(45, 134, 89, 0.4); border-radius: 5px; }
.shift-overlay.so-fn { background: rgba(109, 75, 160, 0.55); color: #C4B5FD; border: 1px solid rgba(109, 75, 160, 0.4); border-radius: 5px; }
.shift-overlay.so-bd { background: rgba(192, 101, 48, 0.55); color: #FDBA74; border: 1px solid rgba(192, 101, 48, 0.4); border-radius: 5px; }
.shift-overlay.so-bn { background: rgba(42, 122, 140, 0.55); color: #67E8F9; border: 1px solid rgba(42, 122, 140, 0.4); border-radius: 5px; }
.shift-overlay.week-block { background: rgba(30, 58, 95, 0.55); border: 1px solid rgba(59, 130, 246, 0.35); border-radius: 6px; color: #93c5fd; flex-direction: column; align-items: flex-start; justify-content: center; gap: 2px; padding: 5px 10px; }
.wk-line { display: flex; align-items: center; gap: 5px; font-size: 11px; color: #cbd5e1; white-space: nowrap; }
.wk-line img { width: 16px; height: 16px; border-radius: 50%; object-fit: cover; }
.wk-line b { min-width: 22px; color: #93c5fd; }

.modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; align-items: center; justify-content: center; }
.modal-bg.open { display: flex; }
.modal { background: #1a1d27; border-radius: 12px; padding: 10px; width: 90%; max-width: 420px; }
.modal h3 { font-size: 11px; margin-bottom: 5px; }
.modal .field { margin-bottom: 12px; }
.modal .field label { display: block; font-size: 13px; font-weight: 600; color: #64748b; margin-bottom: 3px; text-transform: uppercase; }
.modal .field select, .modal .field input { width: 100%; padding: 7px 10px; border: 1px solid #dfe1e6; border-radius: 6px; font-size: 9px; }
.modal .actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 18px; }
.modal .actions button { padding: 8px 16px; border-radius: 6px; border: none; font-size: 9px; cursor: pointer; }
.modal .cancel { background: #0f1117; color: #e2e8f0; }
.modal .save { background: #0052CC; color: #fff; }
.modal .danger { background: #de350b; color: #fff; margin-right: auto; }

@media (max-width: 768px) {
  .team { grid-template-columns: 1fr 1fr; }
  .nav { margin-left: 0; width: 100%; justify-content: center; }
  .cal-cell { min-height: 65px; }
  .s-item { font-size: 10px; }
  .s-item img { display: none; }
}
</style>
</head>
<body>
<div class="header">
  <h1>&#128197; Calendario de Turnos - MID1</h1>
  <span class="badge">FN &#8594; BD &#8594; BN &#8594; FD</span>
  <span style="font-size:11px;color:#6b778c;margin-left:auto">FD/FN: Dom-Mie | BD/BN: Mie-Sab | Rotacion cada 3 meses</span>
</div>
<div id="team" class="team"></div>
<div class="controls">
  <div class="legend">
    <span><span class="dot" style="background:#F59E0B"></span>Dia</span>
    <span><span class="dot" style="background:#1D4ED8"></span>Noche</span>
    <span><span class="dot" style="background:#6554C0"></span>Transicion</span>
  </div>
  <div class="nav">
    <button class="btn btn-icon" id="prev-btn">&#9664;</button>
    <span class="month-title" id="month-title"></span>
    <button class="btn btn-icon" id="next-btn">&#9654;</button>
    <button class="btn" id="today-btn">Hoy</button>
    <button class="btn btn-primary" id="edit-btn">&#9998; Editar</button>
  </div>
</div>
<div class="container">
<div class="cal">
  <div class="cal-header"><div>Dom</div><div>Lun</div><div>Mar</div><div>Mie</div><div>Jue</div><div>Vie</div><div>Sab</div></div>
  <div id="cal-grid" class="cal-grid"></div>
</div>

<div class="modal-bg" id="modal-bg">
  <div class="modal">
    <h3 id="modal-title">Editar Rotacion</h3>
    <div class="field"><label>FN - Front Night (Dom-Mie noche)</label><select id="m-fn"></select></div>
    <div class="field"><label>BD - Back Day (Mie-Sab dia)</label><select id="m-bd"></select></div>
    <div class="field"><label>BN - Back Night (Mie-Sab noche)</label><select id="m-bn"></select></div>
    <div class="field"><label>FD - Front Day (Dom-Mie dia)</label><select id="m-fd"></select></div>
    <div class="field"><label>Fecha inicio</label><input type="date" id="m-date"></div>
    <div class="actions">
      <button class="danger" id="modal-del">Eliminar</button>
      <button class="cancel" id="modal-cancel">Cancelar</button>
      <button class="save" id="modal-save">Guardar</button>
    </div>
  </div>
</div>

</div>

  // Rotations: start Jun, Sep, Dec, Mar
  var rotations = [
    { start: '2025-06-01', FN:'juaortg', BD:'ivanechc', BN:'ferurbi', FD:'reynafma' },
    { start: '2025-09-01', FN:'reynafma', BD:'juaortg', BN:'ivanechc', FD:'ferurbi' },

  ];

  var now = new Date();
  var viewYear = now.getFullYear();
  var viewMonth = now.getMonth();

  function getPerson(alias) {
    for (var i = 0; i < PEOPLE.length; i++) { if (PEOPLE[i].alias === alias) return PEOPLE[i]; }
    return { alias: alias, name: alias, photo: '' };
  }

  function getRotation(dateStr) {
    var date = new Date(dateStr + 'T12:00:00');
    // If in transition week, use the NEW rotation (the one starting that week)
    for (var i = 0; i < rotations.length; i++) {
      var rotStart = new Date(rotations[i].start + 'T12:00:00');
      var rotDow = rotStart.getDay();
      var sunday = new Date(rotStart);
      sunday.setDate(sunday.getDate() - rotDow);
      var saturday = new Date(sunday);
      saturday.setDate(saturday.getDate() + 6);
      if (date >= sunday && date <= saturday) {
        return rotations[i];
      }
    }
    // Normal weeks: find active rotation
    var active = rotations[0];
    for (var i = 0; i < rotations.length; i++) {
      if (dateStr >= rotations[i].start) active = rotations[i];
      else break;
    }
    return active;
  }

  function todayStr() {
    var d = new Date();
    return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
  }

  function isTransitionWeek(dateStr) {
    // Transition week = the full Sun-Sat week containing the 1st of a rotation month
    var date = new Date(dateStr + 'T12:00:00');
    for (var i = 0; i < rotations.length; i++) {
      var rotStart = new Date(rotations[i].start + 'T12:00:00');
      // Find Sunday of the week containing rotStart
      var rotDow = rotStart.getDay(); // 0=Sun
      var sunday = new Date(rotStart);
      sunday.setDate(sunday.getDate() - rotDow);
      var saturday = new Date(sunday);
      saturday.setDate(saturday.getDate() + 6);
      // Check if date is between sunday and saturday (inclusive)
      if (date >= sunday && date <= saturday) return true;
    }
    return false;
  }

  function isRotationStart(dateStr) {
    for (var i = 0; i < rotations.length; i++) {
      if (rotations[i].start === dateStr) return true;
    }
    return false;
  }

  // Get who works on a specific day
  // dow: 0=Sun, 1=Mon, 2=Tue, 3=Wed, 4=Thu, 5=Fri, 6=Sat
  function getShiftsForDay(dateStr, dow) {
    var rot = getRotation(dateStr);
    var trans = isTransitionWeek(dateStr);
    var result = []; // [{type:'day'|'night', shift:'FD'|'BD'|'FN'|'BN', alias:...}]

    if (trans) {
      // TRANSITION WEEK pattern:
      // BD-person: Sun(0), Mon(1), Fri(5), Sat(6) - Day
      // FD-person: Tue(2), Wed(3), Thu(4), Fri(5) - Day
      // FN-person: Sun(0), Mon(1), Tue(2), Wed(3) - Night
      // BN-person: Wed(3), Thu(4), Fri(5), Sat(6) - Night
      if (dow === 0 || dow === 1 || dow === 5 || dow === 6) {
        result.push({ type: 'day', shift: 'BD', alias: rot.BD });
      }
      if (dow === 2 || dow === 3 || dow === 4 || dow === 5) {
        result.push({ type: 'day', shift: 'FD', alias: rot.FD });
      }
      if (dow === 0 || dow === 1 || dow === 2 || dow === 3) {
        result.push({ type: 'night', shift: 'FN', alias: rot.FN });
      }
      if (dow === 3 || dow === 4 || dow === 5 || dow === 6) {
        result.push({ type: 'night', shift: 'BN', alias: rot.BN });
      }
    } else {
      // NORMAL WEEKS:
      // Sun-Wed (0-3): FD (day) + FN (night)
      // Wed-Sat (3-6): BD (day) + BN (night)
      // Wednesday (3) has both shifts (overlap/handoff day)
      if (dow >= 0 && dow <= 3) {
        result.push({ type: 'day', shift: 'FD', alias: rot.FD });
        result.push({ type: 'night', shift: 'FN', alias: rot.FN });
      }
      if (dow >= 3 && dow <= 6) {
        result.push({ type: 'day', shift: 'BD', alias: rot.BD });
        result.push({ type: 'night', shift: 'BN', alias: rot.BN });
      }
    }
    return result;
  }

  function renderTeam() {
    var ds = viewYear + '-' + String(viewMonth+1).padStart(2,'0') + '-15';
    var rot = getRotation(ds);
    var html = '';
    var info = [
      { shift: 'FD', label: 'Front Day', days: 'Dom - Mie', bg: '#FFF3E0', color: '#E97F0F' },
      { shift: 'FN', label: 'Front Night', days: 'Dom - Mie', bg: '#DEEBFF', color: '#0052CC' },
      { shift: 'BD', label: 'Back Day', days: 'Mie - Sab', bg: '#FFF3E0', color: '#E97F0F' },
      { shift: 'BN', label: 'Back Night', days: 'Mie - Sab', bg: '#DEEBFF', color: '#0052CC' }
    ];
    for (var i = 0; i < info.length; i++) {
      var s = info[i];
      var p = getPerson(rot[s.shift]);
      html += '<div class="team-card">';
      html += '<img src="' + p.photo + '"">'
      html += '<div class="info"><div class="name">' + p.name + '</div><div class="alias">@' + p.alias + '</div><div class="days">' + s.days + '</div></div>';
      html += '<span class="shift-tag" style="background:' + s.bg + ';color:' + s.color + '">' + s.shift + '</span>';
      html += '</div>';
    }
    document.getElementById('team').innerHTML = html;
  }

  
  function getSpanClass(shift, dow, isTrans) {
    if (isTrans) {
      // Transition week has its own day patterns
      var transSpans = {
        'BD': [0,1,5,6], // Sun,Mon,Fri,Sat
        'FD': [2,3,4,5], // Tue,Wed,Thu,Fri
        'FN': [0,1,2,3], // Sun,Mon,Tue,Wed
        'BN': [3,4,5,6]  // Wed,Thu,Fri,Sat
      };
      var days = transSpans[shift];
      if (!days) return 'span-single';
      var idx = days.indexOf(dow);
      if (idx === -1) return 'span-single';
      // Check if consecutive
      if (days.length === 1) return 'span-single';
      // Find consecutive groups
      var groups = [];
      var group = [days[0]];
      for (var i = 1; i < days.length; i++) {
        if (days[i] === days[i-1] + 1) { group.push(days[i]); }
        else { groups.push(group); group = [days[i]]; }
      }
      groups.push(group);
      // Find which group this dow belongs to
      for (var g = 0; g < groups.length; g++) {
        var gi = groups[g].indexOf(dow);
        if (gi !== -1) {
          if (groups[g].length === 1) return 'span-single';
          if (gi === 0) return 'span-start';
          if (gi === groups[g].length - 1) return 'span-end';
          return 'span-mid';
        }
      }
      return 'span-single';
    }
    // Normal weeks
    if (shift === 'FD' || shift === 'FN') {
      // Dom-Mie: dow 0,1,2,3
      if (dow === 0) return 'span-start';
      if (dow === 1 || dow === 2) return 'span-mid';
      if (dow === 3) return 'span-end';
    }
    if (shift === 'BD' || shift === 'BN') {
      // Mie-Sab: dow 3,4,5,6
      if (dow === 3) return 'span-start';
      if (dow === 4 || dow === 5) return 'span-mid';
      if (dow === 6) return 'span-end';
    }
    return 'span-single';
  }

function renderCalendar() {
    document.getElementById('month-title').textContent = MONTHS[viewMonth] + ' ' + viewYear;
    var first = new Date(viewYear, viewMonth, 1);
    var last = new Date(viewYear, viewMonth + 1, 0);
    var startDow = first.getDay();
    var tdy = todayStr();
    var html = '';
    var colW = 100 / 7;

    // Build array of all cells (prev month + current + next month fill)
    var cells = [];
    var prevLast = new Date(viewYear, viewMonth, 0).getDate();
    for (var i = startDow - 1; i >= 0; i--) {
      var prevDay = prevLast - i;
      var prevDate = new Date(viewYear, viewMonth - 1, prevDay);
      var prevDs = prevDate.getFullYear() + '-' + String(prevDate.getMonth()+1).padStart(2,'0') + '-' + String(prevDay).padStart(2,'0');
      cells.push({ day: prevDay, other: true, date: prevDs, dow: prevDate.getDay() });
    }
    for (var day = 1; day <= last.getDate(); day++) {
      var ds = viewYear + '-' + String(viewMonth+1).padStart(2,'0') + '-' + String(day).padStart(2,'0');
      var date = new Date(viewYear, viewMonth, day);
      cells.push({ day: day, other: false, date: ds, dow: date.getDay(), isToday: ds === tdy, trans: isTransitionWeek(ds), isStart: isRotationStart(ds) });
    }
    var totalCells = cells.length;
    var rem = (7 - (totalCells % 7)) % 7;
    for (var k = 1; k <= rem; k++) {
      var nextDate = new Date(viewYear, viewMonth + 1, k);
      var nextDs = nextDate.getFullYear() + '-' + String(nextDate.getMonth()+1).padStart(2,'0') + '-' + String(k).padStart(2,'0');
      cells.push({ day: k, other: true, date: nextDs, dow: nextDate.getDay() });
    }

    // Render week by week
    for (var w = 0; w < cells.length; w += 7) {
      html += '<div class="week-row">';
      // Day cells
      for (var c = 0; c < 7; c++) {
        var cell = cells[w + c];
        var cls = 'cal-cell';
        if (cell.other) cls += ' other';
        else if (cell.isToday) cls += ' today';
        else if (cell.trans) cls += ' transition';
        html += '<div class="' + cls + '"><div class="day-num">' + cell.day;
        if (!cell.other && cell.isStart) html += '<span class="change-badge">CAMBIO</span>';
        else if (!cell.other && cell.trans) html += '<span class="trans-badge">T</span>';
        html += '</div></div>';
      }

      // Overlay bars for this week
      // Determine which shifts apply to which columns in this week
      var weekShifts = {}; // { 'FD': {alias, cols:[]}, 'FN':..., 'BD':..., 'BN':... }
      for (var c = 0; c < 7; c++) {
        var cell = cells[w + c];
        if (!cell.date) continue;
        var shifts = getShiftsForDay(cell.date, cell.dow);
        for (var s = 0; s < shifts.length; s++) {
          var sh = shifts[s];
          var key = sh.shift;
          if (!weekShifts[key]) weekShifts[key] = { alias: sh.alias, cols: [] };
          weekShifts[key].cols.push(c);
        }
      }

      // Determine if this week is a transition week (any day is transition)
      var weekIsTransition = false;
      for (var c = 0; c < 7; c++) {
        var cell = cells[w + c];
        if (cell.date && isTransitionWeek(cell.date)) { weekIsTransition = true; break; }
      }

      var barOrder = ['FD', 'BD', 'FN', 'BN'];

      if (!weekIsTransition) {
        // NORMAL WEEK: one thick blue bar spanning the whole week with all shifts listed
        // Collect shifts present this week in order
        var rot = null;
        for (var c = 0; c < 7; c++) {
          var cell = cells[w + c];
          if (cell.date) { rot = getRotation(cell.date); break; }
        }
        if (rot) {
          var lines = [];
          var shiftLabels = { FN:'FN', BD:'BD', BN:'BN', FD:'FD' };
          var order = ['FN','BD','BN','FD'];
          for (var oi = 0; oi < order.length; oi++) {
            var sk = order[oi];
            var pr = getPerson(rot[sk]);
            lines.push('<div class="wk-line"><img src="' + pr.photo + '"><b>' + sk + '</b> ' + pr.alias + '</div>');
          }
          html += '<div class="shift-overlay week-block" style="top:14%;left:0.3%;width:99.4%;height:82%;">' + lines.join('') + '</div>';
        }
      } else {
        // TRANSITION WEEK: separate colored bars per shift
        var numBars = 0;
        for (var b2 = 0; b2 < barOrder.length; b2++) { if (weekShifts[barOrder[b2]]) numBars++; }
        var barTopPct = 16;
        var availPct = 100 - barTopPct;
        var barHPct = numBars > 0 ? (availPct / numBars) - 3 : 20;
        var barIdx = 0;

        for (var b = 0; b < barOrder.length; b++) {
          var shiftKey = barOrder[b];
          if (!weekShifts[shiftKey]) continue;
          var cols = weekShifts[shiftKey].cols.sort(function(x,y){return x-y;});
          var alias = weekShifts[shiftKey].alias;
          var p = getPerson(alias);

          var groups = [];
          var grp = [cols[0]];
          for (var g = 1; g < cols.length; g++) {
            if (cols[g] === cols[g-1] + 1) { grp.push(cols[g]); }
            else { groups.push(grp); grp = [cols[g]]; }
          }
          groups.push(grp);

          var top = barTopPct + barIdx * (barHPct + 1);
          for (var gi = 0; gi < groups.length; gi++) {
            var group = groups[gi];
            var left = group[0] * colW;
            var width = group.length * colW;
            var label = '<img src="' + p.photo + '"><b>' + shiftKey + '</b> ' + p.alias.substring(0,7);
            html += '<div class="shift-overlay so-' + shiftKey.toLowerCase() + '" style="top:' + top + '%;left:' + left + '%;width:' + width + '%;height:' + barHPct + '%;">' + label + '</div>';
          }
          barIdx++;
        }
      }

      html += '</div>'; // close week-row
    }

    document.getElementById('cal-grid').innerHTML = html;
  }

function render() { renderTeam(); renderCalendar(); }

  // Modal
  var editIdx = -1;
  function populateModal(rot) {
    for (var i = 0; i < SHIFTS.length; i++) {
      var sel = document.getElementById('m-' + SHIFTS[i].toLowerCase());
      var opts = '';
      for (var j = 0; j < PEOPLE.length; j++) {
        var selected = (rot && rot[SHIFTS[i]] === PEOPLE[j].alias) ? ' selected' : '';
        opts += '<option value="' + PEOPLE[j].alias + '"' + selected + '>' + PEOPLE[j].name + '</option>';
      }
      sel.innerHTML = opts;
    }
  }

  function openEdit() {
    var rot = getRotation(viewYear + '-' + String(viewMonth+1).padStart(2,'0') + '-15');
    editIdx = rotations.indexOf(rot);
    populateModal(rot);
    document.getElementById('m-date').value = rot.start;
    document.getElementById('modal-bg').classList.add('open');
  }
  function closeModal() { document.getElementById('modal-bg').classList.remove('open'); }
  function saveModal() {
    var obj = { start: document.getElementById('m-date').value, FN: document.getElementById('m-fn').value, BD: document.getElementById('m-bd').value, BN: document.getElementById('m-bn').value, FD: document.getElementById('m-fd').value };
    if (editIdx >= 0) rotations[editIdx] = obj;
    else rotations.push(obj);
    rotations.sort(function(a, b) { return a.start.localeCompare(b.start); });
    closeModal(); render();
  }
  function deleteRot() {
    if (editIdx >= 0 && rotations.length > 1) { rotations.splice(editIdx, 1); closeModal(); render(); }
  }

  document.getElementById('prev-btn').addEventListener('click', function() { viewMonth--; if (viewMonth < 0) { viewMonth = 11; viewYear--; } render(); });
  document.getElementById('next-btn').addEventListener('click', function() { viewMonth++; if (viewMonth > 11) { viewMonth = 0; viewYear++; } render(); });
  document.getElementById('today-btn').addEventListener('click', function() { viewYear = now.getFullYear(); viewMonth = now.getMonth(); render(); });
  document.getElementById('edit-btn').addEventListener('click', openEdit);
  document.getElementById('modal-cancel').addEventListener('click', closeModal);
  document.getElementById('modal-save').addEventListener('click', saveModal);
  document.getElementById('modal-del').addEventListener('click', deleteRot);
  document.getElementById('modal-bg').addEventListener('click', function(e) { if (e.target === this) closeModal(); });

  render();
})();
</script>
